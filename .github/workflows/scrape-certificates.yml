name: Scrape Certificates Daily (v17)

on:
  # Run every day at 18:30 UTC (19:30 CET / 20:30 CEST)
  schedule:
    - cron: '30 18 * * *'
  
  # Allow manual trigger
  workflow_dispatch:

jobs:
  scrape-certificates:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install playwright beautifulsoup4 pandas lxml
          python -m playwright install chromium
          python -m playwright install-deps
          echo "✅ Python dependencies + Playwright installed"
      
      - name: Run CED certificates scraper v17
        env:
          MAX_DETAIL_ISIN: '200'
        run: |
          echo "🚀 Starting CED certificates scraper v17 (multi-source)..."
          python certificates-scraper-ced-v17.py
          echo "✅ Scraper completed"
      
      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet certificates-data.json 2>/dev/null; then
            echo "No changes detected"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "Changes detected in certificates-data.json"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions Bot"
          git add certificates-data.json
          git commit -m "🔄 Auto-update certificates data v17 - $(date +'%Y-%m-%d %H:%M')"
          git push
          echo "✅ Changes committed and pushed"
      
      - name: No changes
        if: steps.check_changes.outputs.has_changes == 'false'
        run: |
          echo "ℹ️ No changes to commit"
