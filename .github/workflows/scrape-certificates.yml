name: Scrape Certificates Daily

on:
  schedule:
    - cron: '30 18 * * *'
  workflow_dispatch:

jobs:
  scrape-certificates:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install playwright beautifulsoup4 pandas lxml
          python -m playwright install chromium
          python -m playwright install-deps
      
      - name: Clean old data and run scraper
        env:
          MAX_DETAIL_ISIN: '100'
        run: |
          echo "Removing old certificates data to start fresh..."
          rm -f certificates-data.json
          echo "Starting CED certificates scraper v16..."
          python certificates-scraper-ced-v15.py
          echo "Scraper completed"
      
      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet certificates-data.json 2>/dev/null; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions Bot"
          git add certificates-data.json
          git add certificates-recenti.json 2>/dev/null || true
          git add certificates-recenti.csv 2>/dev/null || true
          git commit -m "Auto-update certificates data - $(date +'%Y-%m-%d %H:%M')"
          git push
